{% extends "base.html" %}

{% block content %}

<section class="hero">
  <div>
    <p class="eyebrow">Content Manager</p>
    <h1>Resume</h1>
    <p class="subtitle">Upload or replace your current resume PDF.</p>
  </div>
</section>

<div class="card">
  <h2>Current Resume</h2>

  {% if resume %}
    <p><strong>Filename:</strong> {{ resume.filename }}</p>
    <p>
      <a href="{{ url_for('resume.download_resume') }}">Download Current Resume</a>
    </p>
  {% else %}
    <p>No resume uploaded yet.</p>
  {% endif %}

  <form action="{{ url_for('resume.resume') }}" method="POST" enctype="multipart/form-data">
    <label>Choose PDF</label><br>
    <input type="file" name="file" accept=".pdf,application/pdf" required><br><br>

    <button class="button" type="submit">
      {% if resume %}Replace Resume{% else %}Upload Resume{% endif %}
    </button>
  </form>
</div>

{% endblock %}
